news:
  prompt: "Give me today's top news summary."

spring:
  application:
    name: smart-news
  cloud:
    gcp:
      parametermanager:
        enabled: false
  ai:
    retry:
      max-attempts: 1
    google:
      genai:
        api-key: ${GEMINI_API_KEY:dummy-key}
        chat:
          options:
            model: gemini-2.5-flash
            max-output-tokens: 2048

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true

---
spring:
  config:
    activate:
      on-profile: gcp
    import: "pm@"
  cloud:
    gcp:
      parametermanager:
        enabled: true
  ai:
    google:
      genai:
        chat:
          options:
            model: ${pm@projects/smart-news-20260321/locations/global/parameters/smart-news-model/versions/latest}
            max-output-tokens: 2048
news:
  prompt: ${pm@projects/smart-news-20260321/locations/global/parameters/smart-news-prompt/versions/latest}
management:
  endpoints:
    web:
      exposure:
        include: health, refresh
