news:
  prompt: "Give me today's top news summary."
  mail:
    from: ${SENDGRID_FROM_EMAIL:csaba.daniel2@gmail.com}
    to: ${SENDGRID_TO_EMAIL:csaba.daniel2@gmail.com}
    subject: "Smart News"

spring:
  application:
    name: smart-news
  cloud:
    gcp:
      parametermanager:
        enabled: false
      secretmanager:
        enabled: false
  ai:
    retry:
      max-attempts: 1
    google:
      genai:
        api-key: ${GEMINI_API_KEY:dummy-key}
        chat:
          options:
            model: gemini-2.5-flash
            max-output-tokens: 2048
  mail:
    host: smtp.sendgrid.net
    port: 587
    username: apikey
    password: ${SENDGRID_API_KEY:dummy-key}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
  health:
    mail:
      enabled: false

---
spring:
  config:
    activate:
      on-profile: gcp
    import: "pm@,sm://"
  cloud:
    gcp:
      parametermanager:
        enabled: true
      secretmanager:
        enabled: true
  ai:
    google:
      genai:
        api-key: ${sm://projects/smart-news-20260321/secrets/gemini-api-key}
        chat:
          options:
            model: ${pm@projects/smart-news-20260321/locations/global/parameters/smart-news-model/versions/latest}
            max-output-tokens: 2048
  mail:
    username: apikey
    password: ${sm://projects/smart-news-20260321/secrets/sendgrid-api-key}
news:
  prompt: ${pm@projects/smart-news-20260321/locations/global/parameters/smart-news-prompt/versions/latest}
  mail:
    from: ${sm://projects/smart-news-20260321/secrets/sender-email}
    to: ${sm://projects/smart-news-20260321/secrets/recipient-email}
    subject: "Smart News"
management:
  endpoints:
    web:
      exposure:
        include: health, refresh
