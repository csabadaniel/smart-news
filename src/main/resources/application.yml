news:
  prompt: "Give me today's top news summary."

spring:
  application:
    name: smart-news
  ai:
    retry:
      max-attempts: 1
    google:
      genai:
        api-key: ${GEMINI_API_KEY:dummy-key}
        chat:
          options:
            model: gemini-2.5-flash

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
