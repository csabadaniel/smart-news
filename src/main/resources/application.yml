news:
  prompt: "Give me today's top news summary."
  mail:
    from: ${GMAIL_USERNAME}
    to: ${GMAIL_USERNAME}
    subject: "Smart News"
    text: "Here is your news!"

spring:
  application:
    name: smart-news
  cloud:
    gcp:
      parametermanager:
        enabled: false
  ai:
    retry:
      max-attempts: 1
    google:
      genai:
        api-key: ${GEMINI_API_KEY:dummy-key}
        chat:
          options:
            model: gemini-2.5-flash
            max-output-tokens: 2048
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${GMAIL_USERNAME}
    password: ${GMAIL_APP_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
  health:
    mail:
      enabled: false

---
spring:
  config:
    activate:
      on-profile: gcp
    import: "pm@"
  cloud:
    gcp:
      parametermanager:
        enabled: true
  ai:
    google:
      genai:
        chat:
          options:
            model: ${pm@projects/smart-news-20260321/locations/global/parameters/smart-news-model/versions/latest}
            max-output-tokens: 2048
  mail:
    username: ${pm@projects/smart-news-20260321/locations/global/parameters/gmail-username/versions/v1}
    password: ${pm@projects/smart-news-20260321/locations/global/parameters/gmail-app-password/versions/v1}
news:
  prompt: ${pm@projects/smart-news-20260321/locations/global/parameters/smart-news-prompt/versions/latest}
  mail:
    from: ${pm@projects/smart-news-20260321/locations/global/parameters/gmail-username/versions/v1}
    to: ${pm@projects/smart-news-20260321/locations/global/parameters/gmail-username/versions/v1}
management:
  endpoints:
    web:
      exposure:
        include: health, refresh
