news:
  prompt: "Give me today's top news summary."
  mail:
    from: "smart-news@example.com"
    to: "reader@example.com"
    subject: "Smart News"

spring:
  application:
    name: smart-news
  cloud:
    gcp:
      parametermanager:
        enabled: false
  ai:
    retry:
      max-attempts: 1
    google:
      genai:
        api-key: dummy-key
        chat:
          options:
            model: gemini-2.5-flash
  mail:
    host: localhost

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      probes:
        enabled: true
  health:
    mail:
      enabled: false
